<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#121214" />
      <stop offset="100%" stop-color="#060608" />
    </linearGradient>
  </defs>

  <style>
    @keyframes float-z {
      0%, 100% {
        transform: translateY(0) scale(0.9);
        opacity: 0.3;
      }
      50% {
        transform: translateY(-10px) scale(1.1);
        opacity: 0.8;
      }
    }
    .logo-text {
      font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
      font-weight: 900;
      font-size: 210px;
      letter-spacing: -6px;
      fill: #444446;
    }
    .sleep-z {
      font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
      font-weight: bold;
      fill: #8E8E93;
      transform-origin: center;
      animation: float-z 2s ease-in-out infinite;
    }
    .sleep-z2 {
      animation-delay: 0.7s;
    }
  </style>

  <!-- Squircle Background -->
  <rect width="512" height="512" rx="140" fill="url(#bg-gradient)" />
  
  <!-- Inactive Border -->
  <rect x="20" y="20" width="472" height="472" rx="120" fill="none" stroke="#2C2C2E" stroke-width="24" stroke-dasharray="20 15" />

  <!-- Logo text (Dimmed) -->
  <text x="256" y="280" text-anchor="middle" dominant-baseline="middle" class="logo-text">YD</text>

  <!-- Floating zZz -->
  <text x="380" y="160" font-size="70" class="sleep-z">z</text>
  <text x="430" y="110" font-size="90" class="sleep-z sleep-z2">Z</text>
</svg>
