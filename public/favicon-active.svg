<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- A vibrant multi-stop linear gradient for border -->
    <linearGradient id="glow-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2E93" />
      <stop offset="25%" stop-color="#FF8A00" />
      <stop offset="50%" stop-color="#00E5FF" />
      <stop offset="75%" stop-color="#8F00FF" />
      <stop offset="100%" stop-color="#FF2E93" />
    </linearGradient>
    
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#121214" />
      <stop offset="100%" stop-color="#060608" />
    </linearGradient>

    <!-- Glowing filter for letters -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
    @keyframes hue-shift {
      0% {
        filter: hue-rotate(0deg);
      }
      100% {
        filter: hue-rotate(360deg);
      }
    }
    @keyframes pulse-logo {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }
    .circle-border {
      stroke: url(#glow-gradient);
      stroke-width: 24;
      stroke-linecap: round;
      transform-origin: 256px 256px;
      animation: spin 5s linear infinite;
    }
    .logo-container {
      transform-origin: 256px 256px;
      animation: pulse-logo 3s ease-in-out infinite;
    }
    .logo-text {
      font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
      font-weight: 900;
      font-size: 210px;
      letter-spacing: -6px;
      animation: hue-shift 10s linear infinite;
    }
  </style>

  <!-- Squircle Background -->
  <rect width="512" height="512" rx="140" fill="url(#bg-gradient)" />
  
  <!-- Outer Rotating Circular Border -->
  <!-- We use a stroke-dasharray to make parts of the border glowing and spinning -->
  <circle cx="256" cy="256" r="220" fill="none" class="circle-border" stroke-dasharray="350 150 200 100" />

  <!-- Animated Logo text -->
  <g class="logo-container" filter="url(#neon-glow)">
    <text x="256" y="280" text-anchor="middle" dominant-baseline="middle" class="logo-text" fill="url(#glow-gradient)">YD</text>
  </g>
</svg>
